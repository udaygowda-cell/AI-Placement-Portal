# ======================================
# AI Placement Portal - Application Config
# Author: Udaya Kumar K J
# ======================================

# Server
server.port=8080
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/placement_portal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=YourSuperSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong!@#$%
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/resumes

# Gemini AI API
app.gemini.api-key=YOUR_GEMINI_API_KEY
app.gemini.api-url=https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# CORS
app.cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.udaya.placement=DEBUG
logging.level.org.springframework.security=INFO
